
    <svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
                
                * { font-family: 'Share Tech Mono', monospace; }
                
                .bg { fill: #FFFFFF; }
                .grid { stroke: rgba(0, 0, 0, 0.05); stroke-width: 1; }
                
                .cyan { fill: #0099CC; filter: drop-shadow(0 0 3px rgba(0, 153, 204, 0.4)); }
                .magenta { fill: #CC00CC; filter: drop-shadow(0 0 3px rgba(204, 0, 204, 0.4)); }
                .green { fill: #008833; filter: drop-shadow(0 0 3px rgba(0, 136, 51, 0.4)); }
                .orange { fill: #CC6600; filter: drop-shadow(0 0 3px rgba(204, 102, 0, 0.4)); }
                .purple { fill: #8800CC; filter: drop-shadow(0 0 3px rgba(136, 0, 204, 0.4)); }
                .white { fill: #1F2328; }
                .dim { fill: #656D76; }
                
                .title { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
                .big-number { font-size: 72px; font-weight: bold; }
                .label { font-size: 16px; letter-spacing: 1px; }
                .stat-value { font-size: 22px; font-weight: bold; }
                
                .glitch { animation: glitch-anim 3s infinite alternate; }
                @keyframes glitch-anim {
                    0% { transform: translate(0); opacity: 1; }
                    20% { transform: translate(-2px, 1px); }
                    21% { transform: translate(2px, -1px); opacity: 0.8; }
                    22% { transform: translate(0); opacity: 1; filter: drop-shadow(0 0 10px #008833) drop-shadow(-2px 0 #8800CC); }
                    25% { filter: drop-shadow(0 0 3px rgba(0, 136, 51, 0.4)); }
                    100% { transform: translate(0); }
                }

                .blink { animation: blink-anim 1s infinite; }
                @keyframes blink-anim {
                    0%, 100% { opacity: 1; filter: drop-shadow(0 0 6px #CC0000); fill: #CC0000;}
                    50% { opacity: 0.25; filter: none; }
                }
                .live-text {
                    fill: #CC0000;
                    filter: drop-shadow(0 0 4px rgba(204,0,0,0.7));
                }
            </style>

            <pattern id="gridPatternGithub" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
            </pattern>
        </defs>

        <rect width="100%" height="100%" class="bg" rx="10"/>
        <rect width="100%" height="100%" fill="url(#gridPatternGithub)" rx="10"/>

        <text x="40" y="50" class="green title">GITHUB_SYSTEM::STATS</text>
        <line x1="40" y1="65" x2="350" y2="65" stroke="#008833" stroke-width="2" opacity="0.5"/>
        <line x1="330" y1="65" x2="350" y2="45" stroke="#008833" stroke-width="2" opacity="0.5"/>
        
        <g transform="translate(530, 45)">
            <circle cx="0" cy="-5" r="4" class="blink"/>
            <text x="12" y="0" class="live-text" style="font-size: 16px; font-weight: bold; letter-spacing: 2px;">sumitverma77.LIVE</text>
        </g>
        
        <g transform="translate(40, 160)">
            <text x="0" y="0" class="dim label">TOTAL_CONTRIBUTIONS</text>
            <text x="0" y="70" class="green big-number glitch">925</text>
        </g>

        <g transform="translate(480, 150)">
            <rect x="0" y="-30" width="280" height="120" fill="rgba(0,136,51,0.05)" stroke="#008833" stroke-width="1" rx="5" opacity="0.3"/>
            <text x="20" y="0" class="dim label">CURRENT_STREAK</text>
            <text x="20" y="40" class="magenta stat-value" style="font-size: 38px;">2 <tspan class="dim" style="font-size: 16px">DAYS</tspan></text>
            
            <text x="20" y="75" class="dim label">LONGEST_STREAK: <tspan class="white">16</tspan></text>
        </g>

        <g transform="translate(40, 340)">
            <g transform="translate(0, 0)">
                <text x="0" y="0" class="dim label">TOP_LANGUAGE</text>
                <text x="0" y="30" class="cyan stat-value">Java</text>
            </g>
            
            <g transform="translate(250, 0)">
                <text x="0" y="0" class="dim label">MOST_ACTIVE_DAY</text>
                <text x="0" y="30" class="orange stat-value">N/A</text>
            </g>
        </g>
        
        <text x="700" y="430" class="dim" style="font-size: 10px;">v1.1</text>
    </svg>