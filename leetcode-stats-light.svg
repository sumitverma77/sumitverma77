
    <svg width="800" height="450" viewBox="0 0 800 450" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <style>
                @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&amp;display=swap');
                
                * { font-family: 'Share Tech Mono', monospace; }
                
                .bg { fill: #FFFFFF; }
                .grid { stroke: rgba(0, 0, 0, 0.05); stroke-width: 1; }
                
                .cyan { fill: #0099CC; filter: drop-shadow(0 0 3px rgba(0, 153, 204, 0.4)); }
                .magenta { fill: #CC00CC; filter: drop-shadow(0 0 3px rgba(204, 0, 204, 0.4)); }
                .green { fill: #008833; filter: drop-shadow(0 0 3px rgba(0, 136, 51, 0.4)); }
                .yellow { fill: #AA8800; filter: drop-shadow(0 0 3px rgba(170, 136, 0, 0.4)); }
                .red { fill: #CC0000; filter: drop-shadow(0 0 3px rgba(204, 0, 0, 0.4)); }
                .white { fill: #1F2328; }
                .dim { fill: #656D76; }
                
                .title { font-size: 28px; font-weight: bold; letter-spacing: 2px; }
                .big-number { font-size: 72px; font-weight: bold; }
                .label { font-size: 16px; letter-spacing: 1px; }
                .stat-value { font-size: 22px; font-weight: bold; }
                
                .glitch { animation: glitch-anim 3s infinite alternate; }
                @keyframes glitch-anim {
                    0% { transform: translate(0); opacity: 1; }
                    20% { transform: translate(-2px, 1px); }
                    21% { transform: translate(2px, -1px); opacity: 0.8; }
                    22% { transform: translate(0); opacity: 1; filter: drop-shadow(0 0 10px #0099CC) drop-shadow(-2px 0 #CC00CC); }
                    25% { filter: drop-shadow(0 0 3px rgba(0, 153, 204, 0.4)); }
                    100% { transform: translate(0); }
                }

                .pulse { animation: pulse-anim 2s ease-in-out infinite alternate; }
                @keyframes pulse-anim {
                    0% { opacity: 0.8; filter: drop-shadow(0 0 2px #CC00CC); }
                    100% { opacity: 1; filter: drop-shadow(0 0 10px #CC00CC); }
                }

                .blink { animation: blink-anim 1s infinite; }
                @keyframes blink-anim {
                    0%, 100% { opacity: 1; filter: drop-shadow(0 0 5px #CC0000); }
                    50% { opacity: 0.3; filter: none; }
                }

                .ring-bg { fill: none; stroke: rgba(0, 0, 0, 0.1); stroke-width: 6; }
                .ring {
                    fill: none;
                    stroke-width: 6;
                    stroke-linecap: round;
                    stroke-dasharray: 251.32741228718345;
                    transform: rotate(-90deg);
                    transform-origin: center;
                }
            </style>

            <pattern id="gridPattern" width="40" height="40" patternUnits="userSpaceOnUse">
                <path d="M 40 0 L 0 0 0 40" fill="none" class="grid"/>
            </pattern>
        </defs>

        <rect width="100%" height="100%" class="bg" rx="10"/>
        <rect width="100%" height="100%" fill="url(#gridPattern)" rx="10"/>

        <text x="40" y="50" class="cyan title">LEETCODE_SYSTEM::STATS</text>
        <line x1="40" y1="65" x2="350" y2="65" stroke="#0099CC" stroke-width="2" opacity="0.5"/>
        <line x1="330" y1="65" x2="350" y2="45" stroke="#0099CC" stroke-width="2" opacity="0.5"/>
        
        <g transform="translate(560, 45)">
            <circle cx="0" cy="-5" r="4" fill="#CC0000" class="blink"/>
            <text x="12" y="0" class="red" style="font-size: 16px; font-weight: bold; letter-spacing: 2px;">sumit_verma_77.LIVE</text>
        </g>
        
        <g transform="translate(40, 160)">
            <text x="0" y="0" class="dim label">TOTAL_SOLVED</text>
            <text x="0" y="70" class="cyan big-number glitch">1034</text>
        </g>

        <g transform="translate(480, 150)">
            <rect x="0" y="-30" width="280" height="120" fill="rgba(204,0,204,0.05)" stroke="#CC00CC" stroke-width="1" rx="5" opacity="0.3"/>
            <text x="20" y="0" class="dim label">CONTEST_RATING</text>
            <text x="20" y="40" class="magenta big-number pulse" style="font-size: 42px;">1798</text>
            
            <text x="20" y="70" class="dim label">GLOBAL_RANK: <tspan class="white">65883</tspan></text>
            <text x="20" y="100" class="dim label">ATTENDED: <tspan class="white">78</tspan></text>
        </g>

        <g transform="translate(0, 320)">
            <g transform="translate(100, 40)">
                <circle cx="0" cy="0" r="40" class="ring-bg"/>
                <circle cx="0" cy="0" r="40" class="ring green" style="stroke-dashoffset: 160.9078790465333; filter: drop-shadow(0 0 5px #008833);" />
                <text x="0" y="5" class="white stat-value" text-anchor="middle">372</text>
                <text x="0" y="70" class="green label" text-anchor="middle">EASY</text>
            </g>
            
            <g transform="translate(250, 40)">
                <circle cx="0" cy="0" r="40" class="ring-bg"/>
                <circle cx="0" cy="0" r="40" class="ring yellow" style="stroke-dashoffset: 105.97558197022434; filter: drop-shadow(0 0 5px #AA8800);" />
                <text x="0" y="5" class="white stat-value" text-anchor="middle">598</text>
                <text x="0" y="70" class="yellow label" text-anchor="middle">MEDIUM</text>
            </g>

            <g transform="translate(400, 40)">
                <circle cx="0" cy="0" r="40" class="ring-bg"/>
                <circle cx="0" cy="0" r="40" class="ring red" style="stroke-dashoffset: 235.77136355760922; filter: drop-shadow(0 0 5px #CC0000);" />
                <text x="0" y="5" class="white stat-value" text-anchor="middle">64</text>
                <text x="0" y="70" class="red label" text-anchor="middle">HARD</text>
            </g>
        </g>
        
        <text x="700" y="430" class="dim" style="font-size: 10px;">v1.1</text>
    </svg>