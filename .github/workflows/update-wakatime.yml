# ⚠️ DISABLED — This workflow adds WakaTime coding stats (time tracking).
# It has been disabled because:
#   1. WakaTime stats are personal tracker data, not raw GitHub activity
#   2. The new update-readme.yml workflow handles all stats from GitHub API directly
#   3. Running both simultaneously can cause conflicting README commits
#
# To re-enable: uncomment the `on:` block below and remove this comment header.

# on:
#   schedule:
#     - cron: "0 0 * * *"
#   workflow_dispatch:
#   push:
#     branches:
#       - main

on:
  workflow_dispatch:
    inputs:
      force_run:
        description: "Type ENABLE to manually force this workflow"
        required: true
        default: "disabled"

jobs:
  update-wakatime:
    name: WakaTime Stats Update (DISABLED)
    runs-on: ubuntu-latest
    # Guard: only run if the manual input explicitly says ENABLE
    if: github.event.inputs.force_run == 'ENABLE'
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Pick 3-4 random days for this week
        id: randomdays
        run: |
          NUM_COMMITS=$((3 + RANDOM % 2))
          DAYS=($(shuf -i 1-7 -n $NUM_COMMITS))
          echo "RANDOM_DAYS=${DAYS[*]}" >> $GITHUB_ENV
          echo "Picked days: ${DAYS[*]}"

      - name: Check if today is a commit day
        id: checkday
        run: |
          TODAY=$(date +'%u')
          if [[ " $RANDOM_DAYS " =~ " $TODAY " ]]; then
            echo "RUN_JOB=true" >> $GITHUB_ENV
          else
            echo "RUN_JOB=false" >> $GITHUB_ENV
          fi

      - name: Update WakaTime README
        if: env.RUN_JOB == 'true' && github.event_name == 'schedule'
        uses: sumitverma77/waka-readme-stats@master
        with:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHOW_LOC_CHART: false
          SHOW_PROFILE_VIEWS: false
          SHOW_PROJECTS: false
          SHOW_OS: false
          SHOW_SHORT_INFO: false
          COMMIT_BY_ME: true
          COMMIT_USERNAME: "sumitverma77"
          COMMIT_EMAIL: "987sumitverma@gmail.com"
